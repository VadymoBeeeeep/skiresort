<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking – Skyggefjell Skibakken</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Book Your Stay</h1>
        <p>Reserve rooms, services or ski packages</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="restaurant.html">Restaurant</a>
        <a href="staff.html">Staff Portal</a>
    </nav>

    <main>
        <section>
            <h2>Reservation Form</h2>
            <form>
                <input type="text" placeholder="Full Name" required>
                <input type="email" placeholder="Email Address" required>
                <input type="tel" placeholder="Phone Number" required>
                <input type="date" placeholder="Check-in Date" required>
                <input type="date" placeholder="Check-out Date" required>
                <select required>
                    <option value="">Select Room Type</option>
                    <option>Standard Double</option>
                    <option>Deluxe Suite</option>
                    <option>Family Apartment</option>
                </select>
                <button type="submit" class="btn btn-guest">Confirm Booking</button>
            </form>
        </section>
    </main>

    <footer>
        © 2026 Skyggefjell Skibakken AS • All rights reserved
    </footer>
</body>
</html>
