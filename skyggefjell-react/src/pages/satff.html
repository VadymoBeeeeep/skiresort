<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Portal – Skyggefjell Skibakken</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Staff Portal</h1>
        <p>Internal system – Ski Pass & Equipment Database</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="booking.html">Booking</a>
        <a href="restaurant.html">Restaurant</a>
        <a href="staff.html">Staff Portal</a>
    </nav>

    <main>
        <section>
            <h2>Ski Pass & Rental Records</h2>
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Guest Name</th>
                        <th>Ski Pass Purchase</th>
                        <th>Purchase Method</th>
                        <th>Rental Date</th>
                        <th>Equipment</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Данные будут вставлены JavaScript -->
                </tbody>
            </table>
        </section>
    </main>

    <footer>
        © 2026 Skyggefjell Skibakken AS • Internal use only
    </footer>

    <script>
        // Пример данных (в реальном проекте — запрос к серверу)
        const records = [
            { id: 1001, name: "Ola Nordmann", passDate: "2026-03-01", method: "Online (Vipps)", rentalDate: "2026-03-02", equipment: "Skis + Boots" },
            { id: 1002, name: "Kari Hansen", passDate: "2026-03-03", method: "In-person", rentalDate: "2026-03-03", equipment: "Snowboard" },
            { id: 1003, name: "Lars Johansen", passDate: "2026-03-04", method: "Online (Card)", rentalDate: "-", equipment: "-" },
            { id: 1004, name: "Anna Berg", passDate: "2026-03-02", method: "Online", rentalDate: "2026-03-05", equipment: "Helmet + Poles" }
        ];

        const tbody = document.querySelector('#dataTable tbody');
        records.forEach(r => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${r.id}</td>
                <td>${r.name}</td>
                <td>${r.passDate}</td>
                <td>${r.method}</td>
                <td>${r.rentalDate}</td>
                <td>${r.equipment}</td>
            `;
            tbody.appendChild(tr);
        });
    </script>
</body>
</html>
